services:
  app:
    build:
      context: .
      target: production
    container_name: category-api
    ports:
      - "${PORT:-4000}:4000"
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/categories
      REDIS_URL: redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - category-net

  mongo:
    image: mongo:7
    container_name: category-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - category-net

  redis:
    image: redis:7-alpine
    container_name: category-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - category-net

volumes:
  mongo-data:
  redis-data:

networks:
  category-net:
    driver: bridge
